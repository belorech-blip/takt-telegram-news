<!--
  ТАКТ — блок новостей для Tilda T123
  Источник данных: https://new.devtakt.ru/api/news.php?limit=3
-->
<section class="takt-news" id="takt-news" aria-labelledby="takt-news-title">
  <div class="takt-news__container">
    <div class="takt-news__head">
      <h2 class="takt-news__title" id="takt-news-title">Новости компании</h2>
    </div>

    <div class="takt-news__grid" id="takt-news-grid" aria-live="polite">
      <div class="takt-news__skeleton"></div>
      <div class="takt-news__skeleton"></div>
      <div class="takt-news__skeleton"></div>
    </div>

    <p class="takt-news__state" id="takt-news-state" hidden></p>
  </div>
</section>

<style>
  .takt-news,
  .takt-news * {
    box-sizing: border-box;
  }

  .takt-news {
    --tn-bg: #f7f7f7;
    --tn-surface: #ffffff;
    --tn-text: #111111;
    --tn-muted: #6f6f6f;
    --tn-line: rgba(17, 17, 17, 0.08);
    --tn-radius: 28px;
    --tn-gap: 32px;
    width: 100%;
    background: var(--tn-bg);
    color: var(--tn-text);
    font-family: Inter, Arial, sans-serif;
    padding: 96px 0 104px;
  }

  .takt-news__container {
    width: min(1720px, calc(100% - 96px));
    margin: 0 auto;
  }

  .takt-news__head {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 54px;
  }

  .takt-news__title {
    margin: 0;
    max-width: 1100px;
    font-size: clamp(48px, 5.2vw, 84px);
    line-height: 0.98;
    letter-spacing: -0.055em;
    font-weight: 700;
  }

  .takt-news__grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: var(--tn-gap);
  }

  .takt-news__card {
    position: relative;
    display: flex;
    flex-direction: column;
    min-width: 0;
    overflow: hidden;
    border-radius: var(--tn-radius);
    background: var(--tn-surface);
    border: 1px solid var(--tn-line);
    color: inherit;
    text-decoration: none;
    transform: translateZ(0);
    transition: transform 220ms ease, box-shadow 220ms ease, border-color 220ms ease;
  }

  .takt-news__card:hover {
    transform: translateY(-6px);
    border-color: rgba(17, 17, 17, 0.14);
    box-shadow: 0 24px 70px rgba(17, 17, 17, 0.10);
  }

  .takt-news__media {
    position: relative;
    width: 100%;
    aspect-ratio: 1.28 / 1;
    overflow: hidden;
    background: #e8e8e8;
  }

  .takt-news__media img,
  .takt-news__media video {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
    transition: transform 500ms cubic-bezier(.2,.7,.2,1);
  }

  .takt-news__card:hover .takt-news__media img,
  .takt-news__card:hover .takt-news__media video {
    transform: scale(1.025);
  }

  .takt-news__date {
    position: absolute;
    top: 24px;
    left: 24px;
    z-index: 2;
    display: inline-flex;
    align-items: center;
    min-height: 44px;
    padding: 8px 14px;
    border-radius: 8px;
    background: rgba(17, 17, 17, 0.76);
    color: #ffffff;
    font-size: 19px;
    line-height: 1;
    letter-spacing: -0.01em;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }

  .takt-news__badge {
    position: absolute;
    right: 24px;
    bottom: 24px;
    z-index: 2;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    min-height: 40px;
    padding: 8px 12px;
    border-radius: 999px;
    background: rgba(17, 17, 17, 0.78);
    color: #ffffff;
    font-size: 15px;
    line-height: 1;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }

  .takt-news__play {
    position: absolute;
    top: 50%;
    left: 50%;
    z-index: 2;
    width: 64px;
    height: 64px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    transform: translate(-50%, -50%);
    background: rgba(255, 255, 255, 0.92);
    box-shadow: 0 10px 34px rgba(0, 0, 0, 0.16);
  }

  .takt-news__play::before {
    content: "";
    width: 0;
    height: 0;
    margin-left: 4px;
    border-top: 8px solid transparent;
    border-bottom: 8px solid transparent;
    border-left: 13px solid #111111;
  }

  .takt-news__body {
    display: flex;
    flex: 1;
    flex-direction: column;
    padding: 34px 38px 36px;
  }

  .takt-news__card-title {
    margin: 0;
    font-size: clamp(25px, 2vw, 34px);
    line-height: 1.08;
    letter-spacing: -0.035em;
    font-weight: 600;
  }

  .takt-news__excerpt {
    margin: 18px 0 0;
    color: var(--tn-muted);
    font-size: 17px;
    line-height: 1.45;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .takt-news__more {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-top: auto;
    padding-top: 28px;
    font-size: 17px;
    line-height: 1;
    font-weight: 600;
  }

  .takt-news__arrow {
    width: 34px;
    height: 34px;
    display: grid;
    place-items: center;
    border-radius: 50%;
    background: #111111;
    color: #ffffff;
    transition: transform 220ms ease;
  }

  .takt-news__card:hover .takt-news__arrow {
    transform: translate(3px, -3px);
  }

  .takt-news__skeleton {
    min-height: 560px;
    border-radius: var(--tn-radius);
    background: linear-gradient(100deg, #ededed 20%, #f7f7f7 45%, #ededed 70%);
    background-size: 220% 100%;
    animation: takt-news-loading 1.25s infinite linear;
  }

  .takt-news__state {
    margin: 0;
    padding: 32px 0 0;
    color: var(--tn-muted);
    font-size: 18px;
  }

  @keyframes takt-news-loading {
    to { background-position-x: -220%; }
  }

  @media (max-width: 1199px) {
    .takt-news {
      padding: 76px 0 84px;
    }

    .takt-news__container {
      width: min(100% - 48px, 1160px);
    }

    .takt-news__grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 24px;
    }

    .takt-news__card:nth-child(3) {
      grid-column: 1 / -1;
      max-width: calc(50% - 12px);
    }
  }

  @media (max-width: 767px) {
    .takt-news {
      padding: 56px 0 64px;
    }

    .takt-news__container {
      width: calc(100% - 32px);
    }

    .takt-news__head {
      margin-bottom: 32px;
    }

    .takt-news__title {
      font-size: clamp(42px, 13vw, 62px);
    }

    .takt-news__grid {
      grid-template-columns: 1fr;
      gap: 18px;
    }

    .takt-news__card:nth-child(3) {
      grid-column: auto;
      max-width: none;
    }

    .takt-news__media {
      aspect-ratio: 1.22 / 1;
    }

    .takt-news__date {
      top: 16px;
      left: 16px;
      min-height: 38px;
      font-size: 16px;
    }

    .takt-news__badge {
      right: 16px;
      bottom: 16px;
    }

    .takt-news__body {
      padding: 26px 24px 28px;
    }

    .takt-news__card-title {
      font-size: 27px;
    }

    .takt-news__skeleton {
      min-height: 480px;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    .takt-news__card,
    .takt-news__media img,
    .takt-news__media video,
    .takt-news__arrow {
      transition: none;
    }

    .takt-news__skeleton {
      animation: none;
    }
  }
</style>

<script>
  (function () {
    const API_URL = 'https://new.devtakt.ru/api/news.php?limit=3';
    const grid = document.getElementById('takt-news-grid');
    const state = document.getElementById('takt-news-state');

    if (!grid || grid.dataset.initialized === 'true') return;
    grid.dataset.initialized = 'true';

    const escapeHtml = (value) => String(value ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');

    const formatDate = (iso) => {
      const date = new Date(iso);
      if (Number.isNaN(date.getTime())) return '';

      return new Intl.DateTimeFormat('ru-RU', {
        day: '2-digit',
        month: 'long',
        year: 'numeric'
      }).format(date).replace(' г.', '');
    };

    const mediaBadge = (item) => {
      const media = Array.isArray(item.media) ? item.media : [];
      if (media.length > 1) {
        const hasVideo = media.some((entry) => entry.type === 'video' || entry.type === 'animation');
        return `<span class="takt-news__badge">${hasVideo ? 'Фото + видео' : 'Галерея'} · ${media.length}</span>`;
      }
      return '';
    };

    const mediaMarkup = (item) => {
      const primary = item.primary_media || (Array.isArray(item.media) ? item.media[0] : null);

      if (!primary || !primary.url) {
        return '<div class="takt-news__media"></div>';
      }

      const isVideo = primary.type === 'video' || primary.type === 'animation';
      const safeUrl = escapeHtml(primary.url);
      const safePreview = escapeHtml(primary.preview_url || '');

      if (isVideo) {
        return `
          <div class="takt-news__media">
            <video muted playsinline preload="metadata" ${safePreview ? `poster="${safePreview}"` : ''}>
              <source src="${safeUrl}" type="${escapeHtml(primary.mime_type || 'video/mp4')}">
            </video>
            <span class="takt-news__play" aria-hidden="true"></span>
            ${mediaBadge(item)}
          </div>`;
      }

      return `
        <div class="takt-news__media">
          <img src="${safeUrl}" alt="" loading="lazy" decoding="async">
          ${mediaBadge(item)}
        </div>`;
    };

    const renderCard = (item) => {
      const title = escapeHtml(item.title || 'Новость компании');
      const excerpt = escapeHtml(item.excerpt || '');
      const url = escapeHtml(item.telegram_url || 'https://t.me/razdvatakt');
      const date = escapeHtml(formatDate(item.published_at));

      return `
        <a class="takt-news__card" href="${url}" target="_blank" rel="noopener noreferrer" aria-label="${title}">
          <div style="position:relative">
            ${mediaMarkup(item)}
            ${date ? `<time class="takt-news__date" datetime="${escapeHtml(item.published_at)}">${date}</time>` : ''}
          </div>
          <div class="takt-news__body">
            <h3 class="takt-news__card-title">${title}</h3>
            ${excerpt ? `<p class="takt-news__excerpt">${excerpt}</p>` : ''}
            <span class="takt-news__more">
              Подробнее
              <span class="takt-news__arrow" aria-hidden="true">↗</span>
            </span>
          </div>
        </a>`;
    };

    fetch(API_URL, { method: 'GET', mode: 'cors', credentials: 'omit' })
      .then((response) => {
        if (!response.ok) throw new Error('API request failed');
        return response.json();
      })
      .then((payload) => {
        const items = Array.isArray(payload.items) ? payload.items.slice(0, 3) : [];

        if (!payload.ok || items.length === 0) {
          grid.innerHTML = '';
          state.hidden = false;
          state.textContent = 'Новости скоро появятся.';
          return;
        }

        grid.innerHTML = items.map(renderCard).join('');
      })
      .catch(() => {
        grid.innerHTML = '';
        state.hidden = false;
        state.textContent = 'Не удалось загрузить новости. Обновите страницу позже.';
      });
  })();
</script>
